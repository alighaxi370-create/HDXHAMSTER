    const gallery = document.getElementById('gallery');
    const paginationDiv = document.getElementById('pagination');
    const searchInput = document.getElementById('searchInput');
    let currentPage = 1;
    let filteredItems = [];

    function generateVideos() {
        videoData.forEach((video, i) => {
            const item = document.createElement('div');
            item.className = 'video-item';
            item.dataset.title = video.title;
            item.innerHTML = `
                <a href="${mainLink}" class="video-card">
                    <img src="${video.thumb}" class="video-thumbnail">
                    <span class="duration">${video.duration}</span>
                </a>
                <div class="video-title">${video.title}</div>
            `;
            gallery.appendChild(item);
        });
        filteredItems = Array.from(gallery.getElementsByClassName('video-item'));
    }

    function showPage(page) {
        const totalPages = Math.ceil(filteredItems.length / itemsPerPage);
        currentPage = page;
        const start = (page - 1) * itemsPerPage;
        const end = start + itemsPerPage;

        filteredItems.forEach(item => item.classList.remove('show'));
        filteredItems.slice(start, end).forEach(item => item.classList.add('show'));

        renderPagination(totalPages);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function renderPagination(totalPages) {
        paginationDiv.innerHTML = '';
        const prev = document.createElement('button');
        prev.textContent = 'Previous';
        prev.disabled = currentPage === 1;
        prev.onclick = () => showPage(currentPage - 1);
        paginationDiv.appendChild(prev);

        for(let i = 1; i <= totalPages; i++) {
            const pageBtn = document.createElement('span');
            pageBtn.textContent = i;
            pageBtn.className = 'page-num' + (i === currentPage ? ' active' : '');
            pageBtn.onclick = () => showPage(i);
            paginationDiv.appendChild(pageBtn);
        }

        const next = document.createElement('button');
        next.textContent = 'Next';
        next.disabled = currentPage === totalPages;
        next.onclick = () => showPage(currentPage + 1);
        paginationDiv.appendChild(next);
    }

    searchInput.addEventListener('keyup', () => {
        const query = searchInput.value.toLowerCase();
        filteredItems = Array.from(gallery.getElementsByClassName('video-item')).filter(item => item.dataset.title.toLowerCase().includes(query));
        showPage(1);
    });

    generateVideos();
    showPage(1);
</script>
